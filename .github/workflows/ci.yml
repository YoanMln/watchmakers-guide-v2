name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ["**"]

  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Check formating
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
